  /api/v1/work-orders:
    get:
      parameters:
      - description: filter by plan id (uuid)
        in: query
        name: plan_id
        type: string
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: 'filter by status: PLANNED, IN_CUTTING, IN_PROCESSING, COMPLETED,
          COSTED'
        in: query
        name: status
        type: string
      - description: filter by local created date (Asia/Ho_Chi_Minh), format YYYY-MM-DD
        in: query
        name: date
        type: string
      - description: filter created_at from (RFC3339 or YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: filter created_at to (RFC3339 or YYYY-MM-DD); date-only means
          inclusive local day end
        in: query
        name: to
        type: string
      - description: 'sort column: created_at, status (default created_at)'
        in: query
        name: sort_by
        type: string
      - description: 'sort direction: asc, desc (default desc)'
        in: query
        name: order
        type: string
      - description: 'operational preset: dashboard_default — shows PLANNED today/yesterday
          then active, excludes COMPLETED/COSTED; mutually exclusive with status/date/from/to/assigned
          filters'
        in: query
        name: preset
        type: string
      - description: 'filter by assignment: ''null'' for unassigned WOs, or a user
          UUID for WOs assigned to that user; mutually exclusive with preset'
        in: query
        name: assigned
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vmarble_warehouse-management-service_internal_platform_httpkit.PagedResult-internal_module_production_WorkOrder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List work orders
      tags:
      - production
    post:
      consumes:
      - application/json
      description: |-
        Creates a PLANNED work order. If the SKU has dimensions and there
        is at least one fitting remnant in stock, the system writes a
        REMNANT_BYPASSED row to inventory_audit_log to record that the
        planner did not allocate any of the suggestions (BR-K05). Provide
        `bypass_reason` to attach a free-text note to that audit row.
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_production.CreateWOInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_module_production.WorkOrder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create work order
      tags:
      - production
