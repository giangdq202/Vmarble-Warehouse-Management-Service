  /api/v1/work-orders/{id}/partial-complete:
    post:
      consumes:
      - application/json
      description: |-
        Closes the WO with an actual_qty < quantity and optionally
        spawns a carry-over WO for the shortfall (#292). Status flips
        IN_PROCESSING → PARTIAL_COMPLETE; the carry-over (when
        requested) starts PLANNED with parent_wo_id pointing at the
        parent. Sales-order line, sku, and plan are inherited so SO
        traceability is preserved.
      parameters:
      - description: work order id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_production.PartialCompleteInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_module_production.PartialCompleteResult'
        "400":
          description: actual_qty out of range or shortfall_reason invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: wo not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: wo not in IN_PROCESSING
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partial-complete a work order
      tags:
      - production
