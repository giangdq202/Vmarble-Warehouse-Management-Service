basePath: /
definitions:
  authn.LoginInput:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  authn.LoginResult:
    properties:
      expires_at:
        type: string
      role:
        type: string
      token:
        type: string
    type: object
  barcode.Barcode:
    properties:
      created_at:
        type: string
      dimensions:
        type: string
      id:
        type: string
      po_id:
        type: string
      produced_date:
        type: string
      production_plan_id:
        type: string
      sku_code:
        type: string
      sku_id:
        type: string
      sku_name:
        type: string
      work_order_id:
        type: string
    type: object
  barcode.GenerateBarcodeInput:
    properties:
      dimensions:
        type: string
      po_id:
        type: string
      produced_date:
        type: string
      production_plan_id:
        type: string
      sku_code:
        type: string
      sku_id:
        type: string
      sku_name:
        type: string
      work_order_id:
        type: string
    type: object
  barcode.RecordScanInput:
    properties:
      barcode_id:
        type: string
      checkpoint:
        $ref: '#/definitions/barcode.ScanCheckpoint'
      scanned_by:
        type: string
    type: object
  barcode.ScanCheckpoint:
    enum:
    - CNC_COMPLETE
    - FINISHED_GOODS
    - SHIPPED
    type: string
    x-enum-varnames:
    - CheckpointCNCComplete
    - CheckpointFinishedGoods
    - CheckpointShipped
  barcode.ScanEvent:
    properties:
      barcode_id:
        type: string
      checkpoint:
        $ref: '#/definitions/barcode.ScanCheckpoint'
      id:
        type: string
      scanned_at:
        type: string
      scanned_by:
        type: string
    type: object
  catalog.BOM:
    properties:
      components:
        items:
          $ref: '#/definitions/catalog.BOMComponent'
        type: array
      sku_id:
        type: string
    type: object
  catalog.BOMComponent:
    properties:
      material_id:
        type: string
      material_type:
        $ref: '#/definitions/catalog.MaterialType'
      quantity_per_unit:
        type: number
      unit:
        type: string
    type: object
  catalog.CreateMaterialInput:
    properties:
      name:
        type: string
      type:
        $ref: '#/definitions/catalog.MaterialType'
      unit:
        type: string
    type: object
  catalog.CreateSKUInput:
    properties:
      code:
        type: string
      dimensions:
        $ref: '#/definitions/domain.Dimension'
      name:
        type: string
      requires_metal:
        type: boolean
    type: object
  catalog.Material:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        $ref: '#/definitions/catalog.MaterialType'
      unit:
        type: string
    type: object
  catalog.MaterialType:
    enum:
    - PLYWOOD
    - GLUE
    - METAL
    - OTHER
    type: string
    x-enum-varnames:
    - MaterialTypePlywood
    - MaterialTypeGlue
    - MaterialTypeMetal
    - MaterialTypeOther
  catalog.SKU:
    properties:
      code:
        type: string
      created_at:
        type: string
      dimensions:
        $ref: '#/definitions/domain.Dimension'
      id:
        type: string
      name:
        type: string
      requires_metal:
        type: boolean
    type: object
  catalog.SetBOMInput:
    properties:
      components:
        items:
          $ref: '#/definitions/catalog.BOMComponent'
        type: array
      sku_id:
        type: string
    type: object
  costing.CostingRecord:
    properties:
      auxiliary_cost:
        $ref: '#/definitions/domain.Money'
      created_at:
        type: string
      finalized:
        type: boolean
      id:
        type: string
      material_cost:
        $ref: '#/definitions/domain.Money'
      sku_id:
        type: string
      total_cost:
        $ref: '#/definitions/domain.Money'
      work_order_id:
        type: string
    type: object
  domain.Dimension:
    properties:
      length_mm:
        type: integer
      width_mm:
        type: integer
    type: object
  domain.Money:
    properties:
      amount:
        type: integer
      currency:
        type: string
    type: object
  domain.PlanStatus:
    enum:
    - DRAFT
    - APPROVED
    - CANCELED
    type: string
    x-enum-varnames:
    - PlanDraft
    - PlanApproved
    - PlanCanceled
  domain.RemnantStatus:
    enum:
    - AVAILABLE
    - ALLOCATED
    - CONSUMED
    - WASTE
    type: string
    x-enum-varnames:
    - RemnantAvailable
    - RemnantAllocated
    - RemnantConsumed
    - RemnantWaste
  domain.WorkOrderStatus:
    enum:
    - PLANNED
    - IN_CUTTING
    - IN_PROCESSING
    - COMPLETED
    - COSTED
    type: string
    x-enum-varnames:
    - WOPlanned
    - WOInCutting
    - WOInProcessing
    - WOCompleted
    - WOCosted
  httpkit.PagedResult-catalog_Material:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/catalog.Material'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-catalog_SKU:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/catalog.SKU'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-costing_CostingRecord:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/costing.CostingRecord'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-inventory_BoardSheet:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/inventory.BoardSheet'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-inventory_InventoryLot:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/inventory.InventoryLot'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-inventory_Remnant:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/inventory.Remnant'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-order_PO:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/order.PO'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-planning_Plan:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/planning.Plan'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  httpkit.PagedResult-production_WorkOrder:
    properties:
      current_page:
        type: integer
      items:
        items:
          $ref: '#/definitions/production.WorkOrder'
        type: array
      limit:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  inventory.BoardSheet:
    properties:
      cost_per_sheet:
        $ref: '#/definitions/domain.Money'
      dimensions:
        $ref: '#/definitions/domain.Dimension'
      grain_pattern:
        type: string
      id:
        type: string
      issued_to_work_order_id:
        type: string
      lot_batch:
        type: string
      lot_id:
        type: string
      quality_grade:
        type: string
      status:
        type: string
      supplier_code:
        type: string
    type: object
  inventory.CutResult:
    properties:
      cutting_record_id:
        type: string
      remnant_id:
        type: string
    type: object
  inventory.InventoryLot:
    properties:
      cost_per_sheet:
        $ref: '#/definitions/domain.Money'
      id:
        type: string
      material_id:
        type: string
      quantity:
        type: integer
      received_at:
        type: string
      supplier_ref:
        type: string
    type: object
  inventory.ReceiveStockInput:
    properties:
      cost_per_sheet:
        $ref: '#/definitions/domain.Money'
      dimensions:
        $ref: '#/definitions/domain.Dimension'
      material_id:
        type: string
      quantity:
        type: integer
      supplier_ref:
        type: string
    type: object
  inventory.RecordCutInput:
    properties:
      bounding_box_length_mm:
        description: |-
          BoundingBoxLengthMM and BoundingBoxWidthMM define the usable area of the
          new remnant produced by this cut (e.g. after a chipped corner is excluded).
          Both must be provided together. If omitted, the system defaults to the
          actual remnant dimension so that search queries always have a value to
          filter on. Must not exceed the corresponding RemnantDimension axis.
        type: integer
      bounding_box_width_mm:
        type: integer
      remnant_dimension:
        $ref: '#/definitions/domain.Dimension'
      remnant_id:
        type: string
      sheet_id:
        type: string
      sku_id:
        type: string
      used_dimension:
        $ref: '#/definitions/domain.Dimension'
      work_order_id:
        type: string
    type: object
  inventory.Remnant:
    properties:
      allocated_to_wo:
        type: string
      bin_location_id:
        type: string
      bounding_box_length_mm:
        type: integer
      bounding_box_width_mm:
        type: integer
      created_at:
        type: string
      dimensions:
        $ref: '#/definitions/domain.Dimension'
      grain_pattern:
        type: string
      id:
        type: string
      lot_batch:
        type: string
      parent_board_id:
        type: string
      parent_remnant_id:
        type: string
      quality_grade:
        type: string
      status:
        $ref: '#/definitions/domain.RemnantStatus'
      supplier_code:
        type: string
    type: object
  inventory.StorageLocation:
    properties:
      barcode:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      label:
        type: string
      rack:
        type: string
      shelf:
        type: string
      zone:
        type: string
    type: object
  order.CreateLineItemInput:
    properties:
      quantity:
        type: integer
      selling_price:
        $ref: '#/definitions/domain.Money'
      sku_id:
        type: string
    type: object
  order.CreatePOInput:
    properties:
      code:
        type: string
      expected_delivery:
        type: string
      line_items:
        items:
          $ref: '#/definitions/order.CreateLineItemInput'
        type: array
    type: object
  order.LineItem:
    properties:
      id:
        type: string
      po_id:
        type: string
      quantity:
        type: integer
      selling_price:
        $ref: '#/definitions/domain.Money'
      sku_id:
        type: string
    type: object
  order.PO:
    properties:
      code:
        type: string
      created_at:
        type: string
      expected_delivery:
        type: string
      id:
        type: string
      line_items:
        items:
          $ref: '#/definitions/order.LineItem'
        type: array
    type: object
  planning.CreatePlanInput:
    properties:
      deadline:
        type: string
      items:
        items:
          $ref: '#/definitions/planning.PlanItemInput'
        type: array
      po_id:
        type: string
    type: object
  planning.Plan:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/planning.PlanItem'
        type: array
      po_id:
        type: string
      status:
        $ref: '#/definitions/domain.PlanStatus'
    type: object
  planning.PlanItem:
    properties:
      id:
        type: string
      plan_id:
        type: string
      quantity:
        type: integer
      sku_id:
        type: string
    type: object
  planning.PlanItemInput:
    properties:
      quantity:
        type: integer
      sku_id:
        type: string
    type: object
  production.ConsumptionRecord:
    properties:
      created_at:
        type: string
      id:
        type: string
      material_id:
        type: string
      material_type:
        type: string
      quantity:
        type: number
      unit:
        type: string
      work_order_id:
        type: string
    type: object
  production.CreateWOInput:
    properties:
      plan_id:
        type: string
      quantity:
        type: integer
      sku_id:
        type: string
    type: object
  production.RecordConsumptionInput:
    properties:
      material_id:
        type: string
      material_type:
        type: string
      quantity:
        type: number
      unit:
        type: string
      work_order_id:
        type: string
    type: object
  production.SuggestAssignmentResult:
    properties:
      in_cutting_count:
        type: integer
      user_id:
        type: string
    type: object
  production.WorkOrder:
    properties:
      assigned_at:
        type: string
      assigned_to:
        type: string
      created_at:
        type: string
      id:
        type: string
      plan_id:
        type: string
      quantity:
        type: integer
      sku_id:
        type: string
      status:
        $ref: '#/definitions/domain.WorkOrderStatus'
    type: object
info:
  contact: {}
  description: Backend API for warehouse & production management.
  title: VMARBLE Warehouse Management Service API
  version: 0.1.0
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username + password and receive a Bearer token.
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/authn.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authn.LoginResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/v1/barcodes:
    post:
      consumes:
      - application/json
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/barcode.GenerateBarcodeInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/barcode.Barcode'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate barcode
      tags:
      - barcode
  /api/v1/barcodes/{id}:
    get:
      parameters:
      - description: barcode id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/barcode.Barcode'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Lookup barcode
      tags:
      - barcode
  /api/v1/barcodes/{id}/scans:
    get:
      parameters:
      - description: barcode id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/barcode.ScanEvent'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List scan events
      tags:
      - barcode
    post:
      consumes:
      - application/json
      parameters:
      - description: barcode id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/barcode.RecordScanInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/barcode.ScanEvent'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Record scan event
      tags:
      - barcode
  /api/v1/costing:
    get:
      parameters:
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: 'filter by finalized: true or false (omit for all)'
        in: query
        name: finalized
        type: boolean
      - description: 'sort direction: asc, desc (default asc)'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpkit.PagedResult-costing_CostingRecord'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List costing records
      tags:
      - costing
  /api/v1/costing/{workOrderID}:
    get:
      parameters:
      - description: work order id (uuid)
        in: path
        name: workOrderID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/costing.CostingRecord'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get costing record by work order
      tags:
      - costing
  /api/v1/costing/{workOrderID}/compute:
    post:
      parameters:
      - description: work order id (uuid)
        in: path
        name: workOrderID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/costing.CostingRecord'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Compute costing for a work order
      tags:
      - costing
  /api/v1/costing/{workOrderID}/finalize:
    post:
      parameters:
      - description: work order id (uuid)
        in: path
        name: workOrderID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Finalize costing for a work order
      tags:
      - costing
  /api/v1/inventory/cuts:
    post:
      consumes:
      - application/json
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/inventory.RecordCutInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/inventory.CutResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Record cutting operation
      tags:
      - inventory
  /api/v1/inventory/lots:
    get:
      parameters:
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: filter by supplier_ref (case-insensitive)
        in: query
        name: search
        type: string
      - description: 'sort column: supplier_ref (default received_at)'
        in: query
        name: sort_by
        type: string
      - description: asc or desc (default desc)
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpkit.PagedResult-inventory_InventoryLot'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List inventory lots (paginated)
      tags:
      - inventory
    post:
      consumes:
      - application/json
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/inventory.ReceiveStockInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/inventory.InventoryLot'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Receive stock (create inventory lot)
