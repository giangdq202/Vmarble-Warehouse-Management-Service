  /api/v1/work-orders/{id}/advance:
    post:
      consumes:
      - application/json
      description: |-
        Transitions a work order. When advancing PLANNED→IN_CUTTING with `sheet_id`,
        the inventory module pre-assigns the sheet and rejects the call with 412 if
        remnant overflow is RED (≥15% of total stock). Admin callers may force the
        bypass by setting `bypass_overflow=true` together with a non-empty
        `bypass_reason`; the bypass is recorded in `inventory_audit_log` with
        action=OVERFLOW_BYPASSED.
      parameters:
      - description: work order id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_production.AdvanceStatusInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid input (e.g. bypass_overflow=true without bypass_reason)
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: invalid status transition
          schema:
            additionalProperties:
              type: string
            type: object
        "412":
          description: precondition failed (operator mismatch, costing missing, remnant
            overflow lock, non-admin bypass)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Advance work order status
      tags:
      - production
