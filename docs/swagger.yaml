info:
  contact: {}
  description: Backend API for warehouse & production management.
  title: VMARBLE Warehouse Management Service API
  version: 0.1.0
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username + password and receive a Bearer token.
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_authn.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_module_authn.LoginResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/v1/admin/users:
    get:
      parameters:
      - description: page number
        in: query
        name: page
        type: integer
      - description: items per page
        in: query
        name: limit
        type: integer
      - description: search by username
        in: query
        name: search
        type: string
      - description: filter by role (comma-separated)
        in: query
        name: role
        type: string
      - description: filter by active status
        in: query
        name: is_active
        type: boolean
      - description: 'sort by: username|role|created_at'
        in: query
        name: sort_by
        type: string
      - description: 'sort order: asc|desc'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vmarble_warehouse-management-service_internal_platform_httpkit.PagedResult-internal_module_authn_UserDetail'
      security:
      - BearerAuth: []
      summary: List all users (paginated & filtered)
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_authn.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_module_authn.UserDetail'
      security:
      - BearerAuth: []
      summary: Create new user
      tags:
      - admin
  /api/v1/admin/users/{id}:
    delete:
      parameters:
      - description: user id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Deactivate user (soft delete)
      tags:
      - admin
    get:
      parameters:
      - description: user id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_module_authn.UserDetail'
      security:
      - BearerAuth: []
      summary: Get user detail
      tags:
      - admin
    put:
      consumes:
      - application/json
      parameters:
      - description: user id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_authn.UpdateUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_module_authn.UserDetail'
      security:
      - BearerAuth: []
      summary: Update user info
      tags:
      - admin
  /api/v1/admin/users/{id}/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: user id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_module_authn.UpdatePasswordInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Admin reset user password
      tags:
      - admin
