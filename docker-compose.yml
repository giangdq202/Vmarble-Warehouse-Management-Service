services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: vmarble
      POSTGRES_PASSWORD: vmarble
      POSTGRES_DB: vmarble
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmarble -d vmarble"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s

  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTH_SECRET: ${AUTH_SECRET}

volumes:
  pgdata:
