# docker-compose.staging.yml
# This file resides on the STAGING SERVER at: /opt/vwms-staging/docker-compose.staging.yml
# DO NOT commit credentials here — use .env.staging

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vmarble}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-vmarble}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vmarble} -d ${POSTGRES_DB:-vmarble}"]
      interval: 5s
      timeout:  3s
      retries:  20
      start_period: 5s

  app:
    # APP_IMAGE is injected by deploy.sh during deployment
    image: ${APP_IMAGE:-ghcr.io/giangdq202/vmarble-warehouse-management-service:staging-latest}
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_staging:
    name: vwms_staging_pgdata
