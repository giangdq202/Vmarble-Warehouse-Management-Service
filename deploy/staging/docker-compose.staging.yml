services:
  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "log_statement=all"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
      - "10.8.0.1:5432:5432"
    logging:
      driver: "journald"
      options:
        tag: "vwms-staging-postgres"
    env_file:
      - .env.staging

  app:
    image: ${APP_IMAGE:-ghcr.io/giangdq202/vmarble-warehouse-management-service:staging-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
      - "10.8.0.1:8080:8080"
    logging:
      driver: "journald"
      options:
        tag: "vwms-staging-app"
    env_file:
      - .env.staging
    depends_on:
      - postgres
